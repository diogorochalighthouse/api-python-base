services:
  postgres:
    image: postgres:16

    container_name: postgres-fastapi

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db

    ports:
      - '5434:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: redis-fastapi

    ports:
      - '6379:6379'

volumes:
  postgres_data:
